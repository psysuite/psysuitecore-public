name: Sync master to public repo

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: master

      - name: Push master to public repo
        run: |
          git remote add public https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/psysuite/psysuitecore-public.git
          git push public master:master --force-with-lease
